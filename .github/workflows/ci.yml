name: Test

# Testing-only CI. Verifies the code is formatted and compiles into a place.
# Jest specs are NOT run here: run-in-roblox (the headless Studio runner) is
# outdated/untrusted in current Rokit, so tests are run manually in Studio
# via ReplicatedStorage/Shared/run-tests.luau (Run button) — see Counter.spec.luau.
# CI's job is to fail fast on format/compile breakage before it reaches Studio.

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rokit + managed tools
        shell: pwsh
        run: |
          Invoke-RestMethod https://raw.githubusercontent.com/rojo-rbx/rokit/main/scripts/install.ps1 | Invoke-Expression
          # Make the rokit bin available for THIS step AND the rest of the job.
          $bin = "$env:USERPROFILE\.rokit\bin"
          echo "$bin" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH
          $env:PATH = "$bin;$env:PATH"
          rokit trust rojo-rbx/rojo
          rokit trust UpliftGames/wally
          rokit trust lune-org/lune
          rokit trust JohnnyMorganz/stylua
          rokit trust pwnwrkz/tungsten
          rokit install

      - name: Install Wally packages
        shell: pwsh
        run: |
          $bin = "$env:USERPROFILE\.rokit\bin"
          $env:PATH = "$bin;$env:PATH"
          wally install

      - name: Format check (stylua)
        shell: pwsh
        run: |
          $bin = "$env:USERPROFILE\.rokit\bin"
          $env:PATH = "$bin;$env:PATH"
          stylua --check src/ automations/

      - name: Compile check (rojo build to temp)
        shell: pwsh
        run: |
          $bin = "$env:USERPROFILE\.rokit\bin"
          $env:PATH = "$bin;$env:PATH"
          $out = Join-Path $env:RUNNER_TEMP "test-place.rbxl"
          rojo build default.project.json --output $out
          if (-not (Test-Path $out)) { throw "rojo build produced no place file" }
