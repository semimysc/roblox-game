name: Test

# Testing-only CI. Does NOT build/publish the place or upload artifacts —
# it verifies the code compiles, is formatted, and would pass Jest specs.
# (Jest runs inside a Roblox runtime; the headless run is gated behind
#  Studio auth which we enable later.)

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rokit toolchain + managed tools
        shell: pwsh
        run: |
          Invoke-RestMethod https://raw.githubusercontent.com/rojo-rbx/rokit/main/scripts/install.ps1 | Invoke-Expression
          # Make the rokit bin dir available to the rest of the job.
          $bin = "$env:USERPROFILE\.rokit\bin"
          echo "$bin" | Out-File -Append -Encoding utf8 $env:GITHUB_PATH
          # Also export now so this shell sees it.
          echo "PATH=$bin;$env:PATH" >> $env:GITHUB_ENV
          # Install rokit-managed tools (rojo, wally, stylua, ...) from rokit.toml.
          rokit install

      - name: Install Wally packages (incl. DevPackages for Jest)
        shell: pwsh
        run: wally install

      - name: Format check (stylua)
        shell: pwsh
        run: rokit run stylua --check src/ automations/

      - name: Type / compile check (rojo build to temp, not published)
        shell: pwsh
        run: |
          $out = Join-Path $env:RUNNER_TEMP "test-place.rbxl"
          rokit run rojo build default.project.json --output $out
          if (-not (Test-Path $out)) { throw "rojo build produced no place file" }

      # Jest specs run inside a Roblox runtime. run-in-roblox drives a
      # headless Studio to execute src/Shared/run-tests.luau and fails on any
      # failing spec. Enable once Studio auth is configured in CI.
      - name: Run Jest specs
        shell: pwsh
        continue-on-error: true
        run: |
          Write-Host "Jest specs run via run-in-roblox; enable once Studio auth is configured in CI."
          # rokit add rojo-rbx/run-in-roblox
          # $out = Join-Path $env:RUNNER_TEMP "test-place.rbxl"
          # run-in-roblox --place $out --script src/Shared/run-tests.luau
