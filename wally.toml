[package]
name = "baopi/game"
version = "0.1.0"
license = "MIT"
authors = ["baopi"]
realm = "shared"
registry = "https://github.com/UpliftGames/wally-index"

[dependencies]
# UI: Fusion (state-driven) + OnyxUI components (built on Fusion)
Fusion = "elttob/fusion@0.2.0"
OnyxUI = "imavafe/onyx-ui@1.0.4"
# Colour utilities required by OnyxUI
ColourUtils = "csqrl/colour-utils@1.4.1"
# State management (framework-agnostic)
Rodux = "roblox/rodux@3.0.0"
# Rodux <-> Fusion bridge (requires Fusion 0.2.x, hence the 0.2.0 pin above)
FusionRodux = "vflour/fusionrodux-2@0.1.32"
# Async utilities
Promise = "evaera/promise@4.0.0"
# Atomic reactive state (optional, pairs well with Fusion/Rodux)
Charm = "littensy/charm@0.7.6"

# NOTE: TestEZ is removed (deprecated). Jest for Lua (jsdotlua port) is the modern replacement.
# Jest runs inside Roblox Studio / the Roblox test backend, not via Lune, so it is a
# dev-dependency only — it gets built into the place file and run by the Roblox test runner.
# To run tests: `rojo build` then use the Roblox Studio Test tab, or the jest-roblox CLI.

[dev-dependencies]
# Modern testing framework (Jest port by jsdotlua). Wally resolves its
# transitive deps (expect, luau-polyfill, etc.) automatically.
# NOTE: 3.10.0 in the index is internally inconsistent (requests luau-polyfill
# >=3.10.0 which doesn't exist), so we pin to a self-consistent rc line.
JestGlobals = "jsdotlua/jest-globals@3.6.1-rc.2"
